version: 2.1

jobs:
  build-apk:
    docker:
      - image: cimg/android:2024.01
    resource_class: large
    steps:
      - checkout

      - run:
          name: Setup Java 21
          command: |
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https
            wget -O- https://apt.corretto.aws/corretto.key | sudo apt-key add -
            sudo add-apt-repository 'deb https://apt.corretto.aws stable main'
            sudo apt-get update
            sudo apt-get install -y java-21-amazon-corretto-jdk
            echo 'export JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto' >> $BASH_ENV
            echo 'export PATH=$JAVA_HOME/bin:$PATH' >> $BASH_ENV

      - run:
          name: Setup Node.js
          command: |
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
            echo 'export NVM_DIR="$HOME/.nvm"' >> $BASH_ENV
            echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV

      - run:
          name: Install dependencies
          command: npm ci

      - run:
          name: Build project
          command: npm run build

      - run:
          name: Setup Capacitor
          command: |
            npm install -g @capacitor/cli@6.0.0
            npm install @capacitor/android

      - run:
          name: Configure Capacitor
          command: |
            echo '{ "appId": "app.lovable.freshngood", "appName": "Fresh N Good", "webDir": "dist" }' > capacitor.config.json

      - run:
          name: Sync Android platform
          command: |
            npx cap sync android

      - run:
          name: Build APK (Debug)
          command: |
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug

      - run:
          name: Build APK (Release)
          command: |
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease

      - store_artifacts:
          path: android/app/build/outputs/apk/debug/app-debug.apk
          destination: app-debug.apk

      - store_artifacts:
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          destination: app-release.apk

workflows:
  version: 2
  build:
    jobs:
      - build-apk
